name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v1.2.1
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          owner: llvm
          base: main
          head: main
